version: '3.8'

services:

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: url-shortener-backend

    #port mapping
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    #loading env var
    env_file:
      - ./Server/.env
    
    restart: always
  
  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    
    container_name: url-shortener-frontend

    ports:
      - "5173:5173"
    
    stdin_open: true
    tty: true
    restart: always #restart when crashes
    
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: url-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend